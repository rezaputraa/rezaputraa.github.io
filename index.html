<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card Component</title>

  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <div class="circle-1"></div>
  <div class="circle-2"></div>
  <div class="circle-3"></div>
  <div class="card">
    <img src="https://images2.imgbox.com/50/f0/8fLv00QF_o.jpg" alt="Reza Putra" />
    <div class="card-body">
      <h2>Muhamad Reza Putra Aditya</h2>
      <h4>Backend Developer</h4>
      <p>Passionate backend developer with expertise in PHP, Rust, and TypeScript.</p>
      <div class="card-body-lower">
        <ul>
          <li>
            <span>1999</span>
            <span>Followers</span>
          </li>
          <li>
            <span>200</span>
            <span>Following</span>
          </li>
          <li>
            <span>15</span>
            <span>Projects</span>
          </li>
        </ul>
        <div class="buttons">
          <button class="cyan">View Projects</button>
          <button class="gold">View Profile</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
